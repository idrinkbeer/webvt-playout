```

  </div>

<script>
function format(name) {
  if (!name) return "";
  return name.replace(".mp3", "").replace(/%20/g, " ");
}

async function update() {
  const res = await fetch("/status");
  const data = await res.json();

  const now = data.nowPlaying;
  const next = data.nextPlaying;

  document.getElementById("now").innerText =
    "NOW: " + format(now?.name);

  document.getElementById("next").innerText =
    "NEXT: " + format(next?.name);

  // progress bar
  if (data.startedAt && data.durationMs) {
    const elapsed = Date.now() - data.startedAt;
    const percent = Math.min((elapsed / data.durationMs) * 100, 100);
    document.getElementById("progress").style.width = percent + "%";
  }

  if (data.startedAt && data.durationMs) {
  const remaining = Math.max(
    0,
    Math.floor((data.durationMs - (Date.now() - data.startedAt)) / 1000)
  );

  document.getElementById("next").innerText += ` | SEG in ${remaining}s`;
}

  // 🔥 queue display
  if (data.queue) {
    const html = data.queue.slice(0, 12).map(item => {
      let cls = "song";
      if (item.type === "vt") cls = "vt";
      if (item.type === "sweeper") cls = "sweeper";

      const isNow = item.name === now?.name;

      return `<div style="
        padding:6px;
        background:${isNow ? '#3b00ff' : 'transparent'};
        color:${isNow ? '#fff' : '#9cf'};
      ">
        ${format(item.name)}
      </div>`;
    }).join("");

    document.getElementById("queue").innerHTML = html;
  }
}

setInterval(update, 1000);
update();
</script>


</body>
