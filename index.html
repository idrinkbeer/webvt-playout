<!DOCTYPE html>

<html>
<head>
  <title>AIR Log</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: monospace;
      margin: 0;
    }

    .header {
      display: flex;
      padding: 10px;
      background: #111;
      border-bottom: 2px solid #333;
    }

    .header div {
      margin-right: 20px;
    }

    .log {
      height: 100vh;
      overflow-y: auto;
    }

    .row {
      display: flex;
      padding: 6px 10px;
      border-bottom: 1px solid #222;
    }

    .row:nth-child(even) {
      background: #111;
    }

    .now {
      background: #3b00ff;
      color: white;
      font-weight: bold;
    }

    .time {
      width: 80px;
      color: #0ff;
    }

    .title {
      flex: 1;
    }

    .type {
      width: 80px;
      text-align: right;
    }

    .song { color: #9cf; }
    .vt { color: orange; }
    .sweeper { color: red; }

  </style>

</head>

<body>

<div class="header">
  <div>AIR LOG</div>
  <div id="clock"></div>
</div>

<div class="log" id="log"></div>

<script>
function format(name) {
  if (!name) return "";
  return name.replace(".mp3", "").replace(/%20/g, " ");
}

function time(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ":" + s.toString().padStart(2, "0");
}

async function update() {
  const res = await fetch("/status");
  const data = await res.json();

  const now = data.nowPlaying;

  let running = 0;

  const html = data.queue.slice(0, 25).map(item => {
    let cls = "song";
    if (item.type === "vt") cls = "vt";
    if (item.type === "sweeper") cls = "sweeper";

    const isNow = item.name === now?.name;

    const row = `
      <div class="row ${cls} ${isNow ? "now" : ""}">
        <div class="time">${time(running)}</div>
        <div class="title">${format(item.name)}</div>
        <div class="type">${item.type}</div>
      </div>
    `;

    running += 180; // placeholder

    return row;
  }).join("");

  document.getElementById("log").innerHTML = html;
}

// clock
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
}, 1000);

setInterval(update, 1000);
update();
</script>

</body>
</html>
