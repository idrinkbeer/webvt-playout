<script>
async function update() {
  const res = await fetch("/status");
  const data = await res.json();

  const now = data.nowPlaying?.name || "None";
  const next = data.nextPlaying?.name || "";

  document.getElementById("now").innerText = "NOW: " + now;
  document.getElementById("next").innerText = "NEXT: " + next;

  // progress bar
  if (data.startedAt && data.durationMs) {
    const elapsed = Date.now() - data.startedAt;
    const percent = Math.min((elapsed / data.durationMs) * 100, 100);
    document.getElementById("progress").style.width = percent + "%";
  }
}

setInterval(update, 1000);
update();
</script>
